# =============================================================
# CompanyRun — nginx reverse-proxy configuration
# =============================================================
#
# Install:
#   sudo cp deploy/nginx/companyrun.conf /etc/nginx/sites-available/companyrun
#   sudo ln -sf /etc/nginx/sites-available/companyrun /etc/nginx/sites-enabled/companyrun
#   sudo nginx -t && sudo systemctl reload nginx
#
# To add SSL later, use certbot:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d companyrun.yourdomain.com
# =============================================================

upstream companyrun_backend {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name companyrun.local _;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/companyrun_access.log;
    error_log  /var/log/nginx/companyrun_error.log;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        image/svg+xml
        font/woff2;

    # ── Client body size (for chat messages, etc.) ───────────
    client_max_body_size 10M;

    # ── API — reverse proxy to Fastify ───────────────────────
    location /api/ {
        proxy_pass http://companyrun_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts — agent LLM calls can take a while
        proxy_connect_timeout 10s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── Socket.io — WebSocket upgrade ────────────────────────
    location /socket.io/ {
        proxy_pass http://companyrun_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived connections
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── Frontend — serve built React SPA ─────────────────────
    root /home/ubuntu/CompanyRun/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Deny dotfiles ────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
}
